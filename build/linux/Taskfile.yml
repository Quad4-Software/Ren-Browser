version: '3'

includes:
  common: ../Taskfile.yml

vars:
  # Signing configuration - edit these values for your project
  # PGP_KEY: "path/to/signing-key.asc"
  # SIGN_ROLE: "builder"  # Options: origin, maint, archive, builder
  #
  # Password is stored securely in system keychain. Run: wails3 setup signing

  # Docker image for cross-compilation (used when building on non-Linux or no CC available)
  CROSS_IMAGE: wails-cross

  FLATPAK_APP_ID: "io.quad4.renbrowser"
  FLATPAK_STAGING: '{{.ROOT_DIR}}/build/flatpak/staging'
  FLATPAK_BUILD_DIR: '{{.ROOT_DIR}}/build/flatpak/build'
  FLATPAK_REPO: '{{.ROOT_DIR}}/build/flatpak/repo'
  FLATPAK_BUNDLE: '{{.ROOT_DIR}}/build/flatpak/{{.FLATPAK_APP_ID}}.flatpak'
  FLATPAK_BUILDER_FLAGS: '--user --disable-rofiles-fuse'
  PACKAGING_ICON: '{{.ROOT_DIR}}/build/packaging/renbrowser-256.png'
  LINUXDEPLOY_TAG: 1-alpha-20251107-1
  APPIMAGETOOL_URL: https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool
  PKG_VERSION:
    sh: |
      sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml

tasks:
  build:
    summary: Builds the application for Linux
    cmds:
      # Linux requires CGO - use Docker when:
      # 1. Cross-compiling from non-Linux, OR
      # 2. No C compiler is available, OR
      # 3. Target architecture differs from host architecture (cross-arch compilation)
      - task: '{{if and (eq OS "linux") (eq .HAS_CC "true") (eq .TARGET_ARCH ARCH)}}build:native{{else}}build:docker{{end}}'
        vars:
          ARCH: '{{.ARCH}}'
          DEV: '{{.DEV}}'
          OUTPUT: '{{.OUTPUT}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
          OBFUSCATED: '{{.OBFUSCATED}}'
          GARBLE_ARGS: '{{.GARBLE_ARGS}}'
    vars:
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      # Determine target architecture (defaults to host ARCH if not specified)
      TARGET_ARCH: '{{.ARCH | default ARCH}}'
      # Check if a C compiler is available (gcc or clang) — cross-platform via wails3 tool
      HAS_CC:
        sh: 'wails3 tool has "gcc|clang"'

  build:native:
    summary: Builds the application natively on Linux
    internal: true
    timeout: 15m
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
          DEV:
            ref: .DEV
      - task: common:generate:icons
      - task: generate:dotdesktop
    preconditions:
      - sh: pkg-config --exists gtk4 && pkg-config --exists webkitgtk-6.0
        msg: "GTK4/WebKitGTK dev packages required. On Debian/Ubuntu: sudo apt install libgtk-4-dev libwebkitgtk-6.0-dev pkg-config"
      - sh: '{{if eq .OBFUSCATED "true"}}command -v garble >/dev/null 2>&1{{else}}true{{end}}'
        msg: "garble is required for obfuscated builds. Install it with: go install mvdan.cc/garble@v0.16.0 (requires Go 1.24+). See https://github.com/burrowers/garble/releases for version/toolchain compatibility."
    cmds:
      - '{{if eq .OBFUSCATED "true"}}garble {{.GARBLE_ARGS}} build{{else}}go build{{end}} {{.BUILD_FLAGS}} -o {{.OUTPUT}}'
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if or .EXTRA_TAGS (eq .OBFUSCATED "true")}}-tags {{if eq .OBFUSCATED "true"}}wails_obfuscated{{if .EXTRA_TAGS}},{{end}}{{end}}{{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if eq .OBFUSCATED "true"}},wails_obfuscated{{end}}{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s -X renbrowser/internal/buildinfo.Version={{.VERSION}} -X renbrowser/internal/buildinfo.Commit={{.GIT_COMMIT}}"{{end}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
    env:
      GOOS: linux
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'

  build:docker:
    summary: Builds for Linux using Docker (for non-Linux hosts or when no C compiler available)
    internal: true
    deps:
      - task: common:build:frontend
        vars:
          OBFUSCATED:
            ref: .OBFUSCATED
      - task: common:generate:icons
      - task: generate:dotdesktop
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required for cross-compilation to Linux. Please install Docker."
      - sh: docker image inspect {{.CROSS_IMAGE}} > /dev/null 2>&1
        msg: |
          Docker image '{{.CROSS_IMAGE}}' not found.
          Build it first: wails3 task setup:docker
    cmds:
      - docker run --rm -v "{{.ROOT_DIR}}:/app" {{.DOCKER_MOUNTS}} -e APP_NAME="{{.APP_NAME}}" {{if .EXTRA_TAGS}}-e EXTRA_TAGS="{{.EXTRA_TAGS}}"{{end}} {{if eq .OBFUSCATED "true"}}-e OBFUSCATED=true{{end}} {{if .GARBLE_ARGS}}-e GARBLE_ARGS="{{.GARBLE_ARGS}}"{{end}} "{{.CROSS_IMAGE}}" linux {{.DOCKER_ARCH}}
      - cmd: docker run --rm -v "{{.ROOT_DIR}}:/app" alpine chown -R $(id -u):$(id -g) /app/bin
        platforms: [linux, darwin]
      - mkdir -p {{.BIN_DIR}}
      - mv "bin/{{.APP_NAME}}-linux-{{.DOCKER_ARCH}}" "{{.OUTPUT}}"
    vars:
      DOCKER_ARCH: '{{.ARCH | default "amd64"}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      # Generate Docker volume mounts: Go module cache + go.mod replace directives
      # Uses wails3 tool docker-mounts for cross-platform compatibility (Windows/Linux/macOS)
      DOCKER_MOUNTS:
        sh: 'wails3 tool docker-mounts'

  package:
    summary: Packages the application for Linux
    deps:
      - task: build
    cmds:
      - task: create:appimage
      - task: create:deb
      - task: create:rpm
      - task: create:aur

  create:appimage:
    summary: Creates a fuse3-compatible AppImage via linuxdeploy
    deps:
      - task: build
        vars:
          ARCH:
            ref: .ARCH
      - task: packaging-icon
      - task: fetch-linuxdeploy
    cmds:
      - chmod +x build/linux/appimage/package-appimage.sh
      - ARCH='{{.ARCH | default ARCH}}' build/linux/appimage/package-appimage.sh "{{.PKG_VERSION}}"

  fetch-linuxdeploy:
    summary: Download linuxdeploy and the AppImage output plugin for the host architecture
    cmds:
      - mkdir -p build/tools
      - |
        set -euo pipefail
        arch="$(uname -m)"
        case "${arch}" in
          x86_64|amd64) suffix=x86_64 ;;
          aarch64|arm64) suffix=aarch64 ;;
          *)
            printf 'Unsupported architecture for AppImage tooling: %s\n' "${arch}" >&2
            exit 1
            ;;
        esac
        fetch() {
          url="$1"
          dest="$2"
          if [ ! -f "$dest" ]; then
            curl -fsSL -o "$dest" "$url"
          fi
          chmod +x "$dest"
        }
        fetch "https://github.com/linuxdeploy/linuxdeploy/releases/download/{{.LINUXDEPLOY_TAG}}/linuxdeploy-${suffix}.AppImage" "build/tools/linuxdeploy-${suffix}.AppImage"
        fetch "{{.APPIMAGETOOL_URL}}-${suffix}.AppImage" "build/tools/appimagetool-${suffix}.AppImage"
        fetch "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" "build/tools/linuxdeploy-plugin-gtk.sh"
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: "curl is required to download linuxdeploy"

  packaging-icon:
    summary: Generate PNG icon for AppImage and native packages
    deps:
      - task: common:generate:icons
    cmds:
      - mkdir -p build/packaging
      - |
        if command -v rsvg-convert >/dev/null 2>&1; then
          rsvg-convert -w 256 -h 256 -o "{{.PACKAGING_ICON}}" flatpak/io.quad4.renbrowser.svg
        else
          cp build/appicon.png "{{.PACKAGING_ICON}}"
        fi

  flatpak:check-webkit:
    summary: Verify the binary links WebKitGTK 6 for org.gnome.Platform
    deps:
      - task: build
    cmds:
      - |
        set -euo pipefail
        if ! command -v ldd >/dev/null 2>&1; then
          exit 0
        fi
        bin="{{.BIN_DIR}}/{{.APP_NAME}}"
        if ldd "$bin" 2>/dev/null | grep -q 'libwebkitgtk-6\.'; then
          exit 0
        fi
        printf 'Flatpak (org.gnome.Platform) needs WebKitGTK 6. Rebuild with the default GTK4 stack. Current ldd:\n' >&2
        ldd "$bin" 2>/dev/null | grep -E 'webkit|gtk' >&2 || ldd "$bin" >&2
        exit 1

  flatpak:staging:
    summary: Stage binary and Flatpak metadata for flatpak-builder
    deps:
      - task: build
      - task: flatpak:check-webkit
    cmds:
      - mkdir -p "{{.FLATPAK_STAGING}}"
      - install -Dm755 "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.FLATPAK_STAGING}}/renbrowser"
      - install -Dm644 flatpak/{{.FLATPAK_APP_ID}}.desktop "{{.FLATPAK_STAGING}}/{{.FLATPAK_APP_ID}}.desktop"
      - install -Dm644 flatpak/{{.FLATPAK_APP_ID}}.metainfo.xml "{{.FLATPAK_STAGING}}/{{.FLATPAK_APP_ID}}.metainfo.xml"
      - install -Dm644 flatpak/{{.FLATPAK_APP_ID}}.svg "{{.FLATPAK_STAGING}}/{{.FLATPAK_APP_ID}}.svg"
      - |
        set -euo pipefail
        if ! command -v rsvg-convert >/dev/null 2>&1; then
          echo "rsvg-convert is required to generate Flatpak PNG icons." >&2
          exit 1
        fi
        for size in 64 128 256; do
          rsvg-convert -w "${size}" -h "${size}" \
            -o "{{.FLATPAK_STAGING}}/{{.FLATPAK_APP_ID}}-${size}.png" \
            flatpak/{{.FLATPAK_APP_ID}}.svg
        done

  flatpak:repo:
    summary: Build a local Flatpak repository
    deps:
      - task: flatpak:staging
    cmds:
      - flatpak-builder {{.FLATPAK_BUILDER_FLAGS}} --force-clean --repo="{{.FLATPAK_REPO}}" --install-deps-from=flathub "{{.FLATPAK_BUILD_DIR}}" flatpak/{{.FLATPAK_APP_ID}}.yml
    preconditions:
      - sh: command -v flatpak-builder >/dev/null 2>&1
        msg: "flatpak-builder not found. Install flatpak and flatpak-builder, then add Flathub: flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"

  flatpak:install:
    summary: Build and install the Flatpak locally
    deps:
      - task: flatpak:staging
    cmds:
      - flatpak-builder {{.FLATPAK_BUILDER_FLAGS}} --force-clean --install-deps-from=flathub --install "{{.FLATPAK_BUILD_DIR}}" flatpak/{{.FLATPAK_APP_ID}}.yml
    preconditions:
      - sh: command -v flatpak-builder >/dev/null 2>&1
        msg: "flatpak-builder not found. Install flatpak and flatpak-builder, then add Flathub: flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"

  flatpak:bundle:
    summary: Build a single-file Flatpak bundle
    deps:
      - task: flatpak:repo
    cmds:
      - flatpak build-bundle "{{.FLATPAK_REPO}}" "{{.FLATPAK_BUNDLE}}" {{.FLATPAK_APP_ID}}
      - printf '%s\n' "{{.FLATPAK_BUNDLE}}"

  create:deb:
    summary: Creates a deb package
    deps:
      - task: build
    cmds:
      - task: generate:dotdesktop
      - task: generate:deb

  create:rpm:
    summary: Creates a rpm package
    deps:
      - task: build
    cmds:
      - task: generate:dotdesktop
      - task: generate:rpm

  create:aur:
    summary: Creates a arch linux packager package
    deps:
      - task: build
    cmds:
      - task: generate:dotdesktop
      - task: generate:aur

  generate:deb:
    summary: Creates a deb package
    cmds:
      - wails3 tool package -name "{{.APP_NAME}}" -format deb -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin
    env:
      GOARCH: '{{.ARCH | default ARCH}}'

  generate:rpm:
    summary: Creates a rpm package
    cmds:
      - wails3 tool package -name "{{.APP_NAME}}" -format rpm -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin
    env:
      GOARCH: '{{.ARCH | default ARCH}}'

  generate:aur:
    summary: Creates a arch linux packager package
    cmds:
      - wails3 tool package -name "{{.APP_NAME}}" -format archlinux -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin

  generate:dotdesktop:
    summary: Generates a `.desktop` file
    dir: build
    cmds:
      - mkdir -p {{.ROOT_DIR}}/build/linux/appimage
      - wails3 generate .desktop -name "{{.APP_NAME}}" -exec "{{.EXEC}}" -icon "{{.ICON}}" -outputfile "{{.ROOT_DIR}}/build/linux/{{.APP_NAME}}.desktop" -categories "{{.CATEGORIES}}"
    vars:
      APP_NAME: '{{.APP_NAME}}'
      EXEC: '{{.APP_NAME}}'
      ICON: '{{.APP_NAME}}'
      CATEGORIES: 'Development;'
      OUTPUTFILE: '{{.ROOT_DIR}}/build/linux/{{.APP_NAME}}.desktop'

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'

  sign:deb:
    summary: Signs the DEB package
    desc: |
      Signs the .deb package with a PGP key.
      Set PGP_KEY in the vars section to override the key configured globally via
      `wails3 setup` (~/.config/wails/defaults.yaml).
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: create:deb
    cmds:
      # PGP_KEY is optional: if unset, `wails3 tool sign` falls back to the key
      # configured globally via `wails3 setup`.
      - wails3 tool sign --input "{{.BIN_DIR}}/{{.APP_NAME}}*.deb" {{if .PGP_KEY}}--pgp-key "{{.PGP_KEY}}"{{end}} {{if .SIGN_ROLE}}--role "{{.SIGN_ROLE}}"{{end}}

  sign:rpm:
    summary: Signs the RPM package
    desc: |
      Signs the .rpm package with a PGP key.
      Set PGP_KEY in the vars section to override the key configured globally via
      `wails3 setup` (~/.config/wails/defaults.yaml).
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: create:rpm
    cmds:
      - wails3 tool sign --input "{{.BIN_DIR}}/{{.APP_NAME}}*.rpm" {{if .PGP_KEY}}--pgp-key "{{.PGP_KEY}}"{{end}}

  sign:packages:
    summary: Signs all Linux packages (DEB and RPM)
    desc: |
      Signs both .deb and .rpm packages with a PGP key.
      Set PGP_KEY in the vars section to override the key configured globally via
      `wails3 setup` (~/.config/wails/defaults.yaml).
      Password is retrieved from system keychain (run: wails3 setup signing)
    cmds:
      - task: sign:deb
      - task: sign:rpm
