plugins {
    id 'com.android.application'
}

android {
    namespace 'com.wails.app'
    compileSdk 34

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "io.quad4.renbrowser"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "0.2.0"

        // Single universal APK for physical devices: arm64 + 32-bit ARM.
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    // One APK with both ABIs (no per-ABI split outputs).
    splits {
        abi {
            enable false
        }
    }

    def keystoreFile = System.getenv("ANDROID_KEYSTORE_FILE")
    def keystorePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
    def signingKeyAlias = System.getenv("ANDROID_KEY_ALIAS") ?: "renbrowser"
    def signingKeyPassword = System.getenv("ANDROID_KEY_PASSWORD") ?: keystorePassword
    def hasKeystore = keystoreFile != null && !keystoreFile.trim().isEmpty() &&
            keystorePassword != null && !keystorePassword.trim().isEmpty() &&
            signingKeyAlias != null && !signingKeyAlias.trim().isEmpty() &&
            signingKeyPassword != null && !signingKeyPassword.trim().isEmpty()

    signingConfigs {
        // A real keystore can be provided via environment variables; without
        // one, release builds are signed with the debug keystore so they can
        // be installed for testing (not suitable for Play Store uploads).
        release {
            if (hasKeystore) {
                storeFile file(keystoreFile)
                storePassword keystorePassword
                keyAlias signingKeyAlias
                keyPassword signingKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // Source sets configuration
    sourceSets {
        main {
            // JNI libraries are in jniLibs folder
            jniLibs.srcDirs = ['src/main/jniLibs']
            // Assets for the WebView
            assets.srcDirs = ['src/main/assets']
        }
    }

    // Packaging options
    packagingOptions {
        // Don't strip Go symbols in debug builds
        doNotStrip '*/arm64-v8a/libwails.so'
        doNotStrip '*/armeabi-v7a/libwails.so'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.biometric:biometric:1.1.0'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
}
