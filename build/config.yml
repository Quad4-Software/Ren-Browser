version: '3'

info:
  companyName: "Quad4"
  productName: "Ren Browser"
  productIdentifier: "io.quad4.renbrowser"
  description: "Reticulum browser for NomadNet pages"
  copyright: "(c) 2026 Quad4"
  comments: "Micron-first mesh browser for NomadNet"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

other:
  - name: Ren Browser metadata
