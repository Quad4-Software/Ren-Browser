# Canonical brand configuration. Edit this file first when forking or rebranding.
# Run `task common:gen:brand` (or any build) to regenerate Go/TS constants and sync build/config.yml.
#
# Out of scope for automatic sync (change manually when forking):
#   - Go module path (go.mod) and Wails binding imports (frontend/bindings/renbrowser/)
#   - CSS token prefix (--ren-*, .ren-*)
#   - Flatpak filename (io.quad4.renbrowser.*) — requires packaging file renames

company: Quad4
displayName: Ren Browser
slug: renbrowser
bundleId: io.quad4.renbrowser
description: Reticulum browser for NomadNet pages
tagline: Reticulum browser for NomadNet pages.
comments: Micron-first mesh browser for NomadNet
copyright: "(c) 2026 Quad4"
version: "0.1.0"
homepage: https://quad4.io

# Stable identifiers (backward compat — change only with a migration plan)
dataDir: .renbrowser
dbFile: renbrowser.db
envPrefix: REN_BROWSER
localStoragePrefix: renbrowser
indexedDbName: renbrowser_micron_wasm_parsers
proxyHeader: X-RenBrowser-Base-Path
tempFilePrefix: renbrowser-rns-
wailsVersion: v3.0.0-alpha2
