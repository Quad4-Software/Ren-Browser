name: Nightly

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      android_all_abis:
        description: "Build APKs for all ABIs (arm64, x86_64, arm, 386)"
        required: false
        type: boolean
        default: false

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/desktop-build.yml
    with:
      channel: nightly
      prerelease: true
      android_all_abis: ${{ inputs.android_all_abis || false }}
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
