name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/desktop-build.yml
    with:
      channel: release
      prerelease: false
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
