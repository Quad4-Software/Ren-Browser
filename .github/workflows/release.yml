name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.1.0)"
        required: true
        type: string
      android_all_abis:
        description: "Build APKs for all ABIs (arm64, x86_64, arm, 386)"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/desktop-build.yml
    with:
      channel: release
      prerelease: false
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      android_sign_release: true
      android_all_abis: ${{ inputs.android_all_abis || false }}
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
