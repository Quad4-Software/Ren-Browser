# Pinned third-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0                    9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/upload-artifact@v7.0.1             043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   actions/cache@v4.2.3                       5a3ec84eff668545956fd18022155c47e93e2684
#   aquasecurity/trivy-action@0.35.0           57a97c7e7821a5776cebc9bb87c984fa69cba8f1

name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - beta
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  GOFLAGS: -mod=vendor
  PNPM_CONFIG_STRICT_DEP_BUILDS: "false"
  RNS_REQUIRED_SIGNER: e46112d44649266d71fe2193e00a4710

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}

      - name: Verify vendored modules
        run: go list -mod=vendor ./...

      - name: gofmt check
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: bash build/scripts/gofmt-project.sh check

      - name: Go tests
        run: task test:go

      - name: Go hard tests
        if: matrix.os == 'ubuntu-latest'
        run: task test:go:hard

      - name: Go plugin tests
        if: matrix.os == 'ubuntu-latest'
        run: go test ./internal/plugins/...
        env:
          GOFLAGS: -mod=vendor

      - name: Contract drift tests
        if: matrix.os == 'ubuntu-latest'
        run: task test:contract

      - name: Verify workspace clean
        uses: ./.github/actions/verify-workspace-clean

  reproducible-binary:
    name: Reproducible server binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          cache-node: "true"

      - name: Reproducible binary check
        run: task check:reproducible

      - name: Verify workspace clean
        uses: ./.github/actions/verify-workspace-clean

  benchmark:
    name: Go benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: bench/baseline
          key: go-bench-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            go-bench-${{ runner.os }}-

      - name: Run benchmarks
        run: task bench:go

      - name: Compare benchmarks
        shell: bash
        run: |
          set -euo pipefail
          if [ -f bench/baseline/go.txt ]; then
            task bench:compare BENCH_BASELINE=bench/baseline/go.txt
          else
            echo "No prior benchmark baseline; skipping regression gate."
          fi

      - name: Save benchmark baseline
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bench/baseline
          cp bench/go.txt bench/baseline/go.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: go-benchmarks
          path: bench/go.txt
          if-no-files-found: error
          retention-days: 30

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"
          cache-node: "true"

      - name: Go coverage
        run: task coverage:go

      - name: Frontend coverage
        run: task coverage:frontend

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-reports
          path: |
            coverage/go.out
            coverage/go.html
            coverage/go-func.txt
            coverage/frontend
          if-no-files-found: error
          retention-days: 14

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"
          cache-node: "true"

      - name: Playwright E2E
        run: task test:e2e

      - name: Playwright visual regression
        continue-on-error: true
        run: task test:visual

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

  brand:
    name: Brand drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"

      - name: Check generated brand files
        run: task common:check:brand

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"
          cache-node: "true"

      - name: Frontend quality gates
        run: task frontend:check

  frontend-artifact:
    name: Frontend artifact
    uses: ./.github/workflows/frontend-build.yml
    with:
      artifact_name: renbrowser-frontend-ci-${{ github.run_id }}-${{ github.run_attempt }}
      retention_days: 1

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"
          cache-node: "true"

      - name: Install frontend dependencies
        run: task common:install:frontend:deps

      - name: Frontend dependency audit
        run: pnpm --dir frontend run audit

      - name: Frontend ESLint security scan
        run: pnpm --dir frontend run lint

      - name: gosec
        run: task gosec

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          skip-dirs: frontend/node_modules,bin,build/android/.gradle,build/android/build,vendor,third_party

      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          skip-files: build/docker/Dockerfile.cross

  build-linux:
    name: Linux (${{ matrix.arch }})
    needs: frontend-artifact
    runs-on: ${{ matrix.runner }}
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend-artifact.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          cache-node: "false"

      - name: Build
        run: task linux:build ARCH=${{ matrix.arch }}

      - name: Package AppImage
        run: task linux:create:appimage ARCH=${{ matrix.arch }}

      - name: Run self-check
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            # Run self-check using xvfb-run on Linux to provide a virtual display for WebKitGTK
            sudo apt-get update && sudo apt-get install -y xvfb
            xvfb-run --auto-servernum ./bin/renbrowser --self-check
          else
            echo "Skipping self-check on non-amd64 runner"
          fi

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg_version="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          case "${{ matrix.arch }}" in
            amd64) img_arch=x86_64 ;;
            arm64) img_arch=aarch64 ;;
            *) echo "Unknown arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          mkdir -p dist/ci
          cp "bin/renbrowser-${pkg_version}-${img_arch}.AppImage" "dist/ci/renbrowser-linux-${{ matrix.arch }}.AppImage"
          cp bin/renbrowser "dist/ci/renbrowser-linux-${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-${{ matrix.arch }}
          path: dist/ci/*
          if-no-files-found: error
          retention-days: 7

  build-android:
    name: Android (debug apk)
    needs: frontend-artifact
    runs-on: ubuntu-latest
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend-artifact.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          install-wails: "true"
          cache-node: "false"

      - name: Setup Android SDK
        uses: ./.github/actions/setup-android

      - name: Cache mobile MTE Go toolchain
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: build/tools/go-mte
          key: go-mte-${{ runner.os }}-${{ hashFiles('build/patches/go/mte-ios.patch', 'build/scripts/ensure-go-mte.sh') }}

      - name: Ensure mobile MTE Go toolchain
        run: task toolchain:mte

      - name: Detect Android signing
        id: android_sign
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: renbrowser
        run: |
          set -euo pipefail
          effective_key_password="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
          if [ -n "$KEYSTORE_B64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$effective_key_password" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            if [ -n "$KEYSTORE_B64" ]; then
              echo "::warning::ANDROID_KEYSTORE_BASE64 is set but ANDROID_KEYSTORE_PASSWORD and/or ANDROID_KEY_PASSWORD is missing. Building debug APK."
            fi
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${RUNNER_TEMP}/release.keystore"
          if [ ! -s "${RUNNER_TEMP}/release.keystore" ]; then
            echo "Decoded keystore is empty. Re-encode with: base64 -w0 release.keystore" >&2
            exit 1
          fi

      - name: Validate Android keystore
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: renbrowser
        run: |
          set -euo pipefail
          keystore="${RUNNER_TEMP}/release.keystore"
          if ! keytool -list -alias "$KEY_ALIAS" -keystore "$keystore" -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Android keystore validation failed for alias '$KEY_ALIAS'." >&2
            echo "Aliases in keystore:" >&2
            keytool -list -keystore "$keystore" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | sed -n 's/^Alias name: //p' >&2 || true
            echo "Check ANDROID_KEYSTORE_PASSWORD (and ANDROID_KEY_PASSWORD if different) repository secrets." >&2
            exit 1
          fi

      - name: Build signed APK
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: renbrowser
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          export ANDROID_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          task package:android

      - name: Build debug APK
        if: steps.android_sign.outputs.available != 'true'
        run: task build:android

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.android_sign.outputs.available == 'true' && 'android-signed-apk' || 'android-debug-apk' }}
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7

  build-desktop:
    name: Build (${{ matrix.target }})
    needs: frontend-artifact
    runs-on: ${{ matrix.os }}
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
            task: windows:build ARCH=amd64
            artifact: bin/renbrowser.exe
            artifact_name: renbrowser-windows-amd64
            install_linux_deps: "false"
            install_wails: "true"
          - target: macos-arm64
            os: macos-latest
            task: darwin:build ARCH=arm64
            artifact: bin/renbrowser
            artifact_name: renbrowser-macos-arm64
            install_linux_deps: "false"
            install_wails: "true"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend-artifact.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: ${{ matrix.install_linux_deps }}
          install-wails: ${{ matrix.install_wails }}
          cache-node: "false"

      - name: Build
        run: task ${{ matrix.task }}

      - name: Run self-check
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "windows-amd64" ]; then
            ./bin/renbrowser.exe --self-check
          else
            ./bin/renbrowser --self-check
          fi

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  build-ios:
    name: iOS (experimental)
    needs: frontend-artifact
    runs-on: macos-latest
    continue-on-error: true
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend-artifact.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "false"
          install-wails: "true"
          cache-node: "false"

      - name: Cache mobile MTE Go toolchain
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: build/tools/go-mte
          key: go-mte-${{ runner.os }}-${{ hashFiles('build/patches/go/mte-ios.patch', 'build/scripts/ensure-go-mte.sh') }}

      - name: Ensure mobile MTE Go toolchain
        run: task toolchain:mte

      - name: Build iOS App
        run: task ios:package

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: renbrowser-ios-app
          path: bin/renbrowser.app
          if-no-files-found: ignore
          retention-days: 7

  build-server:
    name: Server (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: server-linux-amd64
            task: build:server GOOS=linux GOARCH=amd64 OUTPUT=bin/renbrowser-server-linux-amd64
            artifact: bin/renbrowser-server-linux-amd64
            artifact_name: renbrowser-server-linux-amd64
          - target: server-linux-arm64
            task: build:server GOOS=linux GOARCH=arm64 OUTPUT=bin/renbrowser-server-linux-arm64
            artifact: bin/renbrowser-server-linux-arm64
            artifact_name: renbrowser-server-linux-arm64
          - target: server-linux-armv6
            task: build:server GOOS=linux GOARCH=arm GOARM=6 OUTPUT=bin/renbrowser-server-linux-armv6
            artifact: bin/renbrowser-server-linux-armv6
            artifact_name: renbrowser-server-linux-armv6
          - target: server-freebsd-amd64
            task: build:server GOOS=freebsd GOARCH=amd64 OUTPUT=bin/renbrowser-server-freebsd-amd64
            artifact: bin/renbrowser-server-freebsd-amd64
            artifact_name: renbrowser-server-freebsd-amd64
          - target: server-freebsd-arm64
            task: build:server GOOS=freebsd GOARCH=arm64 OUTPUT=bin/renbrowser-server-freebsd-arm64
            artifact: bin/renbrowser-server-freebsd-arm64
            artifact_name: renbrowser-server-freebsd-arm64
          - target: server-windows-amd64
            task: build:server GOOS=windows GOARCH=amd64 OUTPUT=bin/renbrowser-server-windows-amd64.exe
            artifact: bin/renbrowser-server-windows-amd64.exe
            artifact_name: renbrowser-server-windows-amd64.exe
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "false"
          install-wails: "false"
          cache-node: "false"

      - name: Build
        run: task ${{ matrix.task }}

      - name: Server smoke
        if: matrix.target == 'server-linux-amd64'
        shell: bash
        run: bash build/scripts/server-smoke.sh "${{ matrix.artifact }}"

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  ci-ok:
    name: CI
    if: always()
    needs:
      - go
      - benchmark
      - coverage
      - e2e
      - brand
      - frontend
      - frontend-artifact
      - security
      - reproducible-binary
      - build-linux
      - build-android
      - build-desktop
      - build-server
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.go.result }}" \
            "${{ needs.benchmark.result }}" \
            "${{ needs.coverage.result }}" \
            "${{ needs.e2e.result }}" \
            "${{ needs.brand.result }}" \
            "${{ needs.frontend.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.reproducible-binary.result }}" \
            "${{ needs.build-linux.result }}" \
            "${{ needs.build-android.result }}" \
            "${{ needs.build-desktop.result }}" \
            "${{ needs.build-server.result }}" \
            "${{ needs.frontend-artifact.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "One or more required CI jobs failed." >&2; exit 1 ;;
            esac
          done
