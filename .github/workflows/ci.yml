# Pinned third-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0                    9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/upload-artifact@v7.0.1             043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   aquasecurity/trivy-action@0.35.0           57a97c7e7821a5776cebc9bb87c984fa69cba8f1

name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - beta
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: RenBrowser

env:
  GOFLAGS: -mod=vendor

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: RenBrowser

      - name: Setup dependencies
        uses: ./RenBrowser/.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}

      - name: gofmt check
        shell: bash
        run: |
          set -euo pipefail
          dirs="$(go list -mod=vendor -f '{{.Dir}}' ./...)"
          unformatted="$(gofmt -l ${dirs})"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go tests
        run: task test:go

      - name: Go race tests
        if: matrix.os == 'ubuntu-latest'
        run: task test:go:race

      - name: Contract drift tests
        if: matrix.os == 'ubuntu-latest'
        run: task test:contract

      - name: Go fuzz tests
        if: matrix.os == 'ubuntu-latest'
        run: task fuzz:go

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: RenBrowser

      - name: Setup dependencies
        uses: ./RenBrowser/.github/actions/setup
        with:
          install-wails: "false"

      - name: Frontend quality gates
        run: task frontend:check

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: RenBrowser

      - name: Setup dependencies
        uses: ./RenBrowser/.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"

      - name: gosec
        run: task gosec

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: RenBrowser
          severity: HIGH,CRITICAL
          exit-code: 1
          skip-dirs: frontend/node_modules,bin,build/android/.gradle,build/android/build,vendor,third_party

      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: RenBrowser
          severity: HIGH,CRITICAL
          exit-code: 1
          skip-files: build/docker/Dockerfile.cross

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            task: linux:build
            artifact: bin/renbrowser
            artifact_name: renbrowser-linux-amd64
            install_linux_deps: "true"
          - target: windows-amd64
            os: windows-latest
            task: windows:build ARCH=amd64
            artifact: bin/renbrowser.exe
            artifact_name: renbrowser-windows-amd64
            install_linux_deps: "false"
          - target: macos-arm64
            os: macos-latest
            task: darwin:build ARCH=arm64
            artifact: bin/renbrowser
            artifact_name: renbrowser-macos-arm64
            install_linux_deps: "false"
          - target: server-linux-amd64
            os: ubuntu-latest
            task: build:server
            artifact: bin/renbrowser-server
            artifact_name: renbrowser-server-linux-amd64
            install_linux_deps: "true"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: RenBrowser

      - name: Setup dependencies
        uses: ./RenBrowser/.github/actions/setup
        with:
          install-linux-deps: ${{ matrix.install_linux_deps }}

      - name: Build
        run: task ${{ matrix.task }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact_name }}
          path: RenBrowser/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  ci-ok:
    name: CI
    if: always()
    needs:
      - go
      - frontend
      - security
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.go.result }}" \
            "${{ needs.frontend.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.build.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "One or more required CI jobs failed." >&2; exit 1 ;;
            esac
          done
