# Pinned third-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0                    9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/upload-artifact@v7.0.1             043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   aquasecurity/trivy-action@0.35.0           57a97c7e7821a5776cebc9bb87c984fa69cba8f1

name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - beta
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOFLAGS: -mod=vendor
  PNPM_CONFIG_STRICT_DEP_BUILDS: "false"

jobs:
  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: ${{ matrix.os == 'ubuntu-latest' && 'true' || 'false' }}

      - name: Verify vendored modules
        run: go list -mod=vendor ./...

      - name: gofmt check
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: bash build/scripts/gofmt-project.sh check

      - name: Go tests
        run: task test:go

      - name: Go hard tests
        if: matrix.os == 'ubuntu-latest'
        run: task test:go:hard

      - name: Go plugin tests
        if: matrix.os == 'ubuntu-latest'
        run: go test ./internal/plugins/...
        env:
          GOFLAGS: -mod=vendor

      - name: Contract drift tests
        if: matrix.os == 'ubuntu-latest'
        run: task test:contract

  benchmark:
    name: Go benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"

      - name: Run benchmarks
        run: task bench:go

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: go-benchmarks
          path: bench/go.txt
          if-no-files-found: error
          retention-days: 30

  brand:
    name: Brand drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"

      - name: Check generated brand files
        run: task common:check:brand

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"

      - name: Frontend quality gates
        run: task frontend:check

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"

      - name: gosec
        run: task gosec

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          skip-dirs: frontend/node_modules,bin,build/android/.gradle,build/android/build,vendor,third_party

      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          skip-files: build/docker/Dockerfile.cross

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"

      - name: Build
        run: task linux:build ARCH=${{ matrix.arch }}

      - name: Package AppImage
        run: task linux:create:appimage ARCH=${{ matrix.arch }}

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg_version="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          case "${{ matrix.arch }}" in
            amd64) img_arch=x86_64 ;;
            arm64) img_arch=aarch64 ;;
            *) echo "Unknown arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          mkdir -p dist/ci
          cp "bin/renbrowser-${pkg_version}-${img_arch}.AppImage" "dist/ci/renbrowser-linux-${{ matrix.arch }}.AppImage"
          cp bin/renbrowser "dist/ci/renbrowser-linux-${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-${{ matrix.arch }}
          path: dist/ci/*
          if-no-files-found: error
          retention-days: 7

  build-android:
    name: Android (debug apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          install-wails: "true"

      - name: Setup Android SDK
        uses: ./.github/actions/setup-android

      - name: Build debug APK
        run: task build:android

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-debug-apk
          path: bin/renbrowser.apk
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
            task: windows:build ARCH=amd64
            artifact: bin/renbrowser.exe
            artifact_name: renbrowser-windows-amd64
            install_linux_deps: "false"
            install_wails: "true"
          - target: macos-arm64
            os: macos-latest
            task: darwin:build ARCH=arm64
            artifact: bin/renbrowser
            artifact_name: renbrowser-macos-arm64
            install_linux_deps: "false"
            install_wails: "true"
          - target: server-linux-amd64
            os: ubuntu-latest
            task: build:server
            artifact: bin/renbrowser-server
            artifact_name: renbrowser-server-linux-amd64
            install_linux_deps: "false"
            install_wails: "false"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: ${{ matrix.install_linux_deps }}
          install-wails: ${{ matrix.install_wails }}

      - name: Build
        run: task ${{ matrix.task }}

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  ci-ok:
    name: CI
    if: always()
    needs:
      - go
      - benchmark
      - brand
      - frontend
      - security
      - build-linux
      - build-android
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.go.result }}" \
            "${{ needs.benchmark.result }}" \
            "${{ needs.brand.result }}" \
            "${{ needs.frontend.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.build-linux.result }}" \
            "${{ needs.build-android.result }}" \
            "${{ needs.build.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "One or more required CI jobs failed." >&2; exit 1 ;;
            esac
          done
