name: Beta

on:
  push:
    branches:
      - beta
    tags:
      - "v*-beta*"
      - "v*-rc*"
  workflow_dispatch:
    inputs:
      android_all_abis:
        description: "Build APKs for all ABIs (arm64, x86_64, arm, 386)"
        required: false
        type: boolean
        default: false

concurrency:
  group: beta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/desktop-build.yml
    with:
      channel: beta
      prerelease: true
      tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
      android_all_abis: ${{ inputs.android_all_abis || false }}
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
