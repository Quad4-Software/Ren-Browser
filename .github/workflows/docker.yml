# Pinned third-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0                 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   docker/metadata-action@v6.2.0           dc802804100637a589fabce1cb79ff13a1411302
#   docker/login-action@v4.4.0              af1e73f918a031802d376d3c8bbc3fe56130a9b0
#   docker/setup-buildx-action@v4.2.0       bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
#   docker/build-push-action@v7.3.0         53b7df96c91f9c12dcc8a07bcb9ccacbed38856a

name: Docker server

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
      - beta
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "nightly-*"
  schedule:
    - cron: "15 4 * * *"

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  GOFLAGS: -mod=vendor
  REGISTRY: ghcr.io

jobs:
  image:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          cache-node: "true"

      - name: Read image version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build server
        run: task build:server

      - name: Server smoke
        run: bash build/scripts/server-smoke.sh

      - name: Prepare image context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .docker/server
          cp bin/renbrowser-server .docker/server/server
          cp -a frontend/dist .docker/server/frontend-dist

      - name: Image coordinates
        id: image
        shell: bash
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/renbrowser" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=nightly,enable=${{ github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/nightly-') }}
            type=raw,value=beta,enable=${{ github.ref_name == 'beta' }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .docker/server
          file: .github/docker/Dockerfile.server.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.version }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
