name: Docker server

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "nightly-*"
    branches:
      - beta
  schedule:
    - cron: "15 4 * * *"

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

defaults:
  run:
    working-directory: RenBrowser

env:
  GOFLAGS: -mod=mod
  REGISTRY: ghcr.io

jobs:
  image:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@v7
        with:
          path: RenBrowser

      - name: Setup dependencies
        uses: ./RenBrowser/.github/actions/setup

      - name: Build frontend
        run: task common:build:frontend BUILD_FLAGS="-tags server,production"

      - name: Build server binary
        run: task build:server

      - name: Prepare image context
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .docker/server
          cp bin/renbrowser-server .docker/server/server
          cp -a frontend/dist .docker/server/frontend-dist

      - name: Image coordinates
        id: image
        shell: bash
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/renbrowser-server" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=nightly,enable=${{ github.event_name == 'schedule' }}
            type=raw,value=beta,enable=${{ github.ref_name == 'beta' }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: RenBrowser/.docker/server
          file: RenBrowser/.github/docker/Dockerfile.server.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
