name: Interop

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

concurrency:
  group: interop-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOFLAGS: -mod=vendor

jobs:
  interop:
    name: Live mesh interop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "true"

      - name: Interop tests
        run: task test:interop
        timeout-minutes: 15
