# Pinned third-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0                    9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/upload-artifact@v7.0.1             043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   actions/download-artifact@v8.0.1           3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
#   softprops/action-gh-release@v2.5.0         a06a81a03ee405af7f2048a818ed3f03bbf83c7b

name: Desktop build

on:
  workflow_call:
    inputs:
      channel:
        description: Release channel (nightly, beta, release)
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        type: boolean
      tag:
        description: Git tag to create or update (empty = compute)
        required: false
        type: string
        default: ""
      android_sign_release:
        description: Build a signed release APK (requires keystore secrets)
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: Resolved release version
        value: ${{ jobs.version.outputs.version }}
      tag:
        description: Resolved release tag
        value: ${{ jobs.version.outputs.tag }}
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

permissions:
  contents: write

env:
  GOFLAGS: -mod=vendor

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          base="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          sha="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y.%m.%d)"
          channel="${{ inputs.channel }}"
          tag="${{ inputs.tag }}"

          if [ -z "$tag" ]; then
            case "$channel" in
              nightly)
                tag="nightly-${date}"
                version="${base}-nightly.${date}+${sha}"
                ;;
              beta)
                tag="v${base}-beta.${date}.${sha}"
                version="${base}-beta.${date}+${sha}"
                ;;
              release)
                if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                  tag="${GITHUB_REF#refs/tags/}"
                  version="${tag#v}"
                else
                  echo "Release channel requires a v* tag push or an explicit tag input." >&2
                  exit 1
                fi
                ;;
              *)
                echo "Unknown channel: $channel" >&2
                exit 1
                ;;
            esac
          else
            version="${tag#v}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Linux (${{ matrix.arch }})
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"

      - name: Build
        run: task linux:build ARCH=${{ matrix.arch }}

      - name: Package AppImage
        run: task linux:create:appimage ARCH=${{ matrix.arch }}

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg_version="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          case "${{ matrix.arch }}" in
            amd64) img_arch=x86_64 ;;
            arm64) img_arch=aarch64 ;;
            *) echo "Unknown arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          mkdir -p dist/release
          cp "bin/renbrowser-${pkg_version}-${img_arch}.AppImage" "dist/release/renbrowser-linux-${{ matrix.arch }}.AppImage"
          cp bin/renbrowser "dist/release/renbrowser-linux-${{ matrix.arch }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-${{ matrix.arch }}
          path: dist/release/*
          if-no-files-found: error

  build-windows:
    name: Windows (amd64)
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup

      - name: Build
        run: task windows:build ARCH=amd64

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          Copy-Item bin/renbrowser.exe dist/release/renbrowser-windows-amd64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-amd64
          path: dist/release/*
          if-no-files-found: error

  build-macos:
    name: macOS (universal)
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "false"

      - name: Build universal app bundle
        run: task darwin:package:universal

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          ditto -c -k --sequesterRsrc --keepParent "bin/renbrowser.app" "dist/release/renbrowser-macos-universal.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: macos-universal
          path: dist/release/*
          if-no-files-found: error

  build-server:
    name: Server (linux amd64)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"

      - name: Build server
        run: task build:server

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist/release
          cp bin/renbrowser-server dist/release/renbrowser-server-linux-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: server-linux-amd64
          path: dist/release/*
          if-no-files-found: error

  build-android:
    name: Android (apk)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          install-wails: "true"

      - name: Setup Android SDK
        uses: ./.github/actions/setup-android

      - name: Build debug APK
        if: inputs.channel != 'release'
        run: task build:android

      - name: Skip Android release build
        if: inputs.channel == 'release' && !inputs.android_sign_release
        run: echo "Skipping Android APK on release (ANDROID_KEYSTORE_* secrets not configured)."

      - name: Decode release keystore
        if: inputs.channel == 'release' && inputs.android_sign_release
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${RUNNER_TEMP}/release.keystore"

      - name: Build signed release APK
        if: inputs.channel == 'release' && inputs.android_sign_release
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: task package:android

      - name: Stage artifacts
        if: inputs.channel != 'release' || inputs.android_sign_release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp bin/renbrowser.apk dist/release/renbrowser-android.apk

      - name: Upload artifacts
        if: inputs.channel != 'release' || inputs.android_sign_release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-apk
          path: dist/release/*
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - version
      - build-linux
      - build-windows
      - build-macos
      - build-server
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          tag="${{ needs.version.outputs.tag }}"
          channel="${{ inputs.channel }}"
          cat > release-notes.md <<EOF
          ## Ren Browser ${version}

          Channel: **${channel}**
          Commit: \`${{ github.sha }}\`

          ### Assets
          - Linux amd64/arm64 AppImage and binary
          - Windows amd64 portable executable
          - macOS universal .app (zip)
          - Headless server binary (linux amd64)
          - Android APK (signed on release when keystore secrets are configured)

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${tag}/CHANGELOG.md) for details.
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Ren Browser ${{ needs.version.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.channel == 'release' }}
          files: |
            release/*
            release/SHA256SUMS.txt
          generate_release_notes: ${{ inputs.channel == 'release' }}
