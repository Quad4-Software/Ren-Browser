# Pinned third-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0                    9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/upload-artifact@v7.0.1             043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   actions/download-artifact@v8.0.1           3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
#   softprops/action-gh-release@v3.0.1         718ea10b132b3b2eba29c1007bb80653f286566b

name: Desktop build

on:
  workflow_call:
    inputs:
      channel:
        description: Release channel (nightly, beta, release)
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        type: boolean
      tag:
        description: Git tag to create or update (empty = compute)
        required: false
        type: string
        default: ""
      android_sign_release:
        description: Build a signed release APK (requires keystore secrets)
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: Resolved release version
        value: ${{ jobs.version.outputs.version }}
      tag:
        description: Resolved release tag
        value: ${{ jobs.version.outputs.tag }}
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

permissions:
  contents: write

env:
  GOFLAGS: -mod=vendor

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          base="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          sha="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y.%m.%d)"
          channel="${{ inputs.channel }}"
          tag="${{ inputs.tag }}"

          if [ -z "$tag" ]; then
            case "$channel" in
              nightly)
                tag="nightly-${date}"
                version="${base}-nightly.${date}+${sha}"
                ;;
              beta)
                tag="v${base}-beta.${date}.${sha}"
                version="${base}-beta.${date}+${sha}"
                ;;
              release)
                if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                  tag="${GITHUB_REF#refs/tags/}"
                  version="${tag#v}"
                else
                  echo "Release channel requires a v* tag push or an explicit tag input." >&2
                  exit 1
                fi
                ;;
              *)
                echo "Unknown channel: $channel" >&2
                exit 1
                ;;
            esac
          else
            version="${tag#v}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Linux (${{ matrix.arch }})
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          cache-node: "true"

      - name: Build
        run: task linux:build ARCH=${{ matrix.arch }}

      - name: Package AppImage
        run: task linux:create:appimage ARCH=${{ matrix.arch }}

      - name: Package deb and rpm
        run: |
          task linux:create:deb ARCH=${{ matrix.arch }}
          task linux:create:rpm ARCH=${{ matrix.arch }}

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg_version="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          case "${{ matrix.arch }}" in
            amd64) img_arch=x86_64 ;;
            arm64) img_arch=aarch64 ;;
            *) echo "Unknown arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          mkdir -p dist/release
          cp "bin/renbrowser-${pkg_version}-${img_arch}.AppImage" "dist/release/renbrowser-linux-${{ matrix.arch }}.AppImage"
          cp bin/renbrowser "dist/release/renbrowser-linux-${{ matrix.arch }}"
          cp bin/renbrowser.deb "dist/release/renbrowser-linux-${{ matrix.arch }}.deb"
          cp bin/renbrowser.rpm "dist/release/renbrowser-linux-${{ matrix.arch }}.rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-${{ matrix.arch }}
          path: dist/release/*
          if-no-files-found: error

  build-windows:
    name: Windows (amd64)
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-node: "true"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $dirs = @(
            "${env:ProgramFiles(x86)}\NSIS",
            "${env:ProgramFiles}\NSIS"
          ) | Where-Object { $_ -and (Test-Path $_) }
          if (-not $dirs) {
            throw "NSIS not found under Program Files after choco install."
          }
          $dirs | ForEach-Object { $_ | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append }
          & (Join-Path $dirs[0] 'makensis.exe') /VERSION

      - name: Package NSIS installer
        run: task windows:create:nsis:installer ARCH=amd64

      - name: Package MSIX
        shell: pwsh
        run: task windows:create:msix:package ARCH=amd64

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          Copy-Item bin/renbrowser.exe dist/release/renbrowser-windows-amd64.exe
          Copy-Item bin/renbrowser-amd64-installer.exe dist/release/renbrowser-windows-amd64-installer.exe
          Copy-Item bin/renbrowser-amd64.msix dist/release/renbrowser-windows-amd64.msix

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-amd64
          path: dist/release/*
          if-no-files-found: error

  build-macos:
    name: macOS (universal)
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "false"
          cache-node: "true"

      - name: Build universal app bundle
        run: task darwin:package:universal

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          ditto -c -k --sequesterRsrc --keepParent "bin/renbrowser.app" "dist/release/renbrowser-macos-universal.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: macos-universal
          path: dist/release/*
          if-no-files-found: error

  build-server:
    name: Server (${{ matrix.id }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-linux-amd64
          - id: linux-arm64
            goos: linux
            goarch: arm64
            goarm: "7"
            artifact: renbrowser-server-linux-arm64
          - id: linux-armv6
            goos: linux
            goarch: arm
            goarm: "6"
            artifact: renbrowser-server-linux-armv6
          - id: freebsd-amd64
            goos: freebsd
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-freebsd-amd64
          - id: freebsd-arm64
            goos: freebsd
            goarch: arm64
            goarm: "7"
            artifact: renbrowser-server-freebsd-arm64
          - id: openbsd-amd64
            goos: openbsd
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-openbsd-amd64
          - id: netbsd-amd64
            goos: netbsd
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-netbsd-amd64
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          cache-node: "true"

      - name: Build server
        run: task build:server GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} OUTPUT=bin/${{ matrix.artifact }}

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist/release
          cp "bin/${{ matrix.artifact }}" "dist/release/${{ matrix.artifact }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: server-${{ matrix.id }}
          path: dist/release/*
          if-no-files-found: error

  build-android:
    name: Android (apk)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          install-wails: "true"
          cache-node: "true"

      - name: Setup Android SDK
        uses: ./.github/actions/setup-android

      - name: Detect Android signing
        id: android_sign
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$KEYSTORE_B64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            if [ -n "$KEYSTORE_B64" ]; then
              echo "::warning::ANDROID_KEYSTORE_BASE64 is set but ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and/or ANDROID_KEY_PASSWORD is missing. Building debug APK."
            fi
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Android on release without signing
        if: inputs.channel == 'release' && inputs.android_sign_release && steps.android_sign.outputs.available != 'true'
        run: echo "Skipping Android APK on release (ANDROID_KEYSTORE_* secrets not configured)."

      - name: Decode release keystore
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${RUNNER_TEMP}/release.keystore"
          if [ ! -s "${RUNNER_TEMP}/release.keystore" ]; then
            echo "Decoded keystore is empty. Re-encode with: base64 -w0 release.keystore" >&2
            exit 1
          fi

      - name: Validate Android keystore
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          keystore="${RUNNER_TEMP}/release.keystore"
          if ! keytool -list -alias "$KEY_ALIAS" -keystore "$keystore" -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Android keystore validation failed for alias '$KEY_ALIAS'." >&2
            echo "Aliases in keystore:" >&2
            keytool -list -keystore "$keystore" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | sed -n 's/^Alias name: //p' >&2 || true
            echo "Check ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_ALIAS repository secrets." >&2
            exit 1
          fi

      - name: Build signed APK
        if: steps.android_sign.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: task package:android

      - name: Build debug APK
        if: steps.android_sign.outputs.available != 'true' && (inputs.channel != 'release' || inputs.android_sign_release == false)
        run: task build:android

      - name: Stage artifacts
        if: inputs.channel != 'release' || inputs.android_sign_release == false || steps.android_sign.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          channel="${{ inputs.channel }}"
          if [ "${{ steps.android_sign.outputs.available }}" = "true" ]; then
            if [ "$channel" = "release" ]; then
              apk_name="renbrowser-android.apk"
            else
              apk_name="renbrowser-android-signed.apk"
            fi
          else
            apk_name="renbrowser-android-debug.apk"
          fi
          cp bin/renbrowser.apk "dist/release/${apk_name}"

      - name: Upload artifacts
        if: inputs.channel != 'release' || inputs.android_sign_release == false || steps.android_sign.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-apk
          path: dist/release/*
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - version
      - build-linux
      - build-windows
      - build-macos
      - build-server
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          tag="${{ needs.version.outputs.tag }}"
          channel="${{ inputs.channel }}"
          cat > release-notes.md <<EOF
          ## Ren Browser ${version}

          Channel: **${channel}**
          Commit: \`${{ github.sha }}\`

          ### Assets
          - Linux amd64/arm64 AppImage, plain binary, .deb, and .rpm
          - Windows amd64 portable executable, NSIS installer, and MSIX package
          - macOS universal .app (zip)
          - Headless server binaries (Linux amd64/arm64/armv6, FreeBSD amd64/arm64, OpenBSD/NetBSD amd64)
          - Android APK (debug for nightly/beta; signed release when keystore secrets are configured)

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${tag}/CHANGELOG.md) for details.
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Ren Browser ${{ needs.version.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.channel == 'release' }}
          files: release/*
          generate_release_notes: ${{ inputs.channel == 'release' }}
