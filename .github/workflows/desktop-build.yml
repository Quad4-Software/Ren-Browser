# Pinned third-party actions (bump tag and SHA together when upgrading):
#   actions/checkout@v7.0.0                    9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
#   actions/upload-artifact@v7.0.1             043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
#   actions/download-artifact@v8.0.1           3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
#
# Trivy (SBOM job): pinned via build/scripts/ci/setup-trivy.sh (0.69.3)

name: Desktop build

on:
  workflow_call:
    inputs:
      channel:
        description: Release channel (nightly, beta, release)
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        type: boolean
      tag:
        description: Git tag to create or update (empty = compute)
        required: false
        type: string
        default: ""
      android_sign_release:
        description: Build a signed release APK (requires keystore secrets)
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: Resolved release version
        value: ${{ jobs.version.outputs.version }}
      tag:
        description: Resolved release tag
        value: ${{ jobs.version.outputs.tag }}
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

permissions:
  contents: write
  actions: read

env:
  GOFLAGS: -mod=vendor
  CI_TRIVY_VERSION: "0.69.3"

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          base="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          sha="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y.%m.%d)"
          channel="${{ inputs.channel }}"
          tag="${{ inputs.tag }}"

          if [ -z "$tag" ]; then
            case "$channel" in
              nightly)
                tag="nightly-${date}.${sha}"
                version="${base}-nightly.${date}+${sha}"
                ;;
              beta)
                tag="v${base}-beta.${date}.${sha}"
                version="${base}-beta.${date}+${sha}"
                ;;
              release)
                if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                  tag="${GITHUB_REF#refs/tags/}"
                  version="${tag#v}"
                else
                  echo "Release channel requires a v* tag push or an explicit tag input." >&2
                  exit 1
                fi
                ;;
              *)
                echo "Unknown channel: $channel" >&2
                exit 1
                ;;
            esac
          else
            version="${tag#v}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  frontend:
    name: Frontend artifact
    uses: ./.github/workflows/frontend-build.yml
    with:
      artifact_name: renbrowser-frontend-${{ github.run_id }}-${{ github.run_attempt }}
      retention_days: 7

  build-linux:
    name: Linux (${{ matrix.arch }})
    needs:
      - version
      - frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          cache-node: "false"

      - name: Build
        env:
          REN_BROWSER_FRONTEND_PREBUILT: "1"
        run: task linux:build ARCH=${{ matrix.arch }}

      - name: Package AppImage
        env:
          REN_BROWSER_FRONTEND_PREBUILT: "1"
        run: task linux:create:appimage ARCH=${{ matrix.arch }}

      - name: Package deb, rpm, and Arch
        env:
          REN_BROWSER_FRONTEND_PREBUILT: "1"
        run: |
          task linux:create:deb ARCH=${{ matrix.arch }}
          task linux:create:rpm ARCH=${{ matrix.arch }}
          task linux:create:aur ARCH=${{ matrix.arch }}

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          pkg_version="$(sed -n 's/^  version: "\(.*\)".*/\1/p' build/config.yml)"
          case "${{ matrix.arch }}" in
            amd64) img_arch=x86_64 ;;
            arm64) img_arch=aarch64 ;;
            *) echo "Unknown arch: ${{ matrix.arch }}" >&2; exit 1 ;;
          esac
          mkdir -p dist/release
          cp "bin/renbrowser-${pkg_version}-${img_arch}.AppImage" "dist/release/renbrowser-linux-${{ matrix.arch }}.AppImage"
          cp bin/renbrowser "dist/release/renbrowser-linux-${{ matrix.arch }}"
          cp bin/renbrowser.deb "dist/release/renbrowser-linux-${{ matrix.arch }}.deb"
          cp bin/renbrowser.rpm "dist/release/renbrowser-linux-${{ matrix.arch }}.rpm"
          arch_pkg="bin/renbrowser.pkg.tar.zst"
          if [ ! -f "$arch_pkg" ]; then
            echo "Arch package not found at $arch_pkg" >&2
            ls -la bin >&2 || true
            exit 1
          fi
          cp "$arch_pkg" "dist/release/renbrowser-linux-${{ matrix.arch }}.pkg.tar.zst"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linux-${{ matrix.arch }}
          path: dist/release/*
          if-no-files-found: error

  build-flatpak:
    name: Linux Flatpak (amd64)
    needs:
      - version
      - frontend
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          cache-node: "false"

      - name: Setup Flatpak
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream python3-gi librsvg2-bin libgdk-pixbuf-2.0-0
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        run: task linux:flatpak:bundle ARCH=amd64

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp build/flatpak/io.quad4.renbrowser.flatpak dist/release/renbrowser-linux-amd64.flatpak

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: flatpak-amd64
          path: dist/release/*
          if-no-files-found: error

  build-windows:
    name: Windows (amd64)
    needs:
      - version
      - frontend
    runs-on: windows-latest
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          cache-node: "false"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $dirs = @(
            "${env:ProgramFiles(x86)}\NSIS",
            "${env:ProgramFiles}\NSIS",
            "${env:ChocolateyInstall}\bin"
          ) | Where-Object { $_ -and (Test-Path $_) }
          if (-not $dirs) {
            throw "NSIS not found under Program Files after choco install."
          }
          $dirs | ForEach-Object { $_ | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append }
          $makensis = Join-Path $dirs[0] 'makensis.exe'
          if (-not (Test-Path $makensis)) {
            throw "makensis.exe not found at $makensis"
          }
          & $makensis @('/VERSION')

      - name: Package NSIS installer
        run: task windows:create:nsis:installer ARCH=amd64

      - name: Package MSIX
        shell: pwsh
        continue-on-error: true
        run: task windows:create:msix:package ARCH=amd64

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          Copy-Item bin/renbrowser.exe dist/release/renbrowser-windows-amd64.exe
          Copy-Item bin/renbrowser-amd64-installer.exe dist/release/renbrowser-windows-amd64-installer.exe
          if (Test-Path bin/renbrowser-amd64.msix) {
            Copy-Item bin/renbrowser-amd64.msix dist/release/renbrowser-windows-amd64.msix
          } else {
            Write-Warning "MSIX package not created; continuing without it."
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-amd64
          path: dist/release/*
          if-no-files-found: error

  build-macos:
    name: macOS (universal)
    needs:
      - version
      - frontend
    runs-on: macos-latest
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "false"
          cache-node: "false"

      - name: Build universal app bundle
        run: task darwin:package:universal

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          ditto -c -k --sequesterRsrc --keepParent "bin/renbrowser.app" "dist/release/renbrowser-macos-universal.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: macos-universal
          path: dist/release/*
          if-no-files-found: error

  build-server:
    name: Server (${{ matrix.id }})
    needs:
      - version
      - frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-amd64
            goos: linux
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-linux-amd64
          - id: linux-arm64
            goos: linux
            goarch: arm64
            goarm: "7"
            artifact: renbrowser-server-linux-arm64
          - id: linux-armv6
            goos: linux
            goarch: arm
            goarm: "6"
            artifact: renbrowser-server-linux-armv6
          - id: freebsd-amd64
            goos: freebsd
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-freebsd-amd64
          - id: freebsd-arm64
            goos: freebsd
            goarch: arm64
            goarm: "7"
            artifact: renbrowser-server-freebsd-arm64
          - id: openbsd-amd64
            goos: openbsd
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-openbsd-amd64
          - id: netbsd-amd64
            goos: netbsd
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-netbsd-amd64
          - id: windows-amd64
            goos: windows
            goarch: amd64
            goarm: "7"
            artifact: renbrowser-server-windows-amd64.exe
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          cache-node: "false"

      - name: Build server
        env:
          REN_BROWSER_FRONTEND_PREBUILT: "1"
        run: task build:server GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} OUTPUT=bin/${{ matrix.artifact }}

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist/release
          cp "bin/${{ matrix.artifact }}" "dist/release/${{ matrix.artifact }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: server-${{ matrix.id }}
          path: dist/release/*
          if-no-files-found: error

  build-server-windows-legacy:
    name: Server (Windows 7 amd64)
    needs:
      - version
      - frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Build Windows 7 server
        id: build
        continue-on-error: true
        env:
          REN_BROWSER_FRONTEND_PREBUILT: "1"
        run: bash build/scripts/build-server-windows-legacy.sh

      - name: Stage artifact
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp bin/renbrowser-server-windows7-amd64.exe dist/release/

      - name: Upload artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: server-windows7-amd64
          path: dist/release/renbrowser-server-windows7-amd64.exe
          if-no-files-found: error

  build-android:
    name: Android (apk)
    needs:
      - version
      - frontend
    runs-on: ubuntu-latest
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "true"
          install-wails: "true"
          cache-node: "false"

      - name: Setup Android SDK
        uses: ./.github/actions/setup-android

      - name: Detect Android signing
        id: android_sign
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: renbrowser
        run: |
          set -euo pipefail
          effective_key_password="${KEY_PASSWORD:-$KEYSTORE_PASSWORD}"
          if [ -n "$KEYSTORE_B64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$effective_key_password" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            if [ -n "$KEYSTORE_B64" ]; then
              echo "::warning::ANDROID_KEYSTORE_BASE64 is set but ANDROID_KEYSTORE_PASSWORD and/or ANDROID_KEY_PASSWORD is missing. Building debug APK."
            fi
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Android on release without signing
        if: inputs.channel == 'release' && inputs.android_sign_release && steps.android_sign.outputs.available != 'true'
        run: echo "Skipping Android APK on release (ANDROID_KEYSTORE_* secrets not configured)."

      - name: Decode release keystore
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${RUNNER_TEMP}/release.keystore"
          if [ ! -s "${RUNNER_TEMP}/release.keystore" ]; then
            echo "Decoded keystore is empty. Re-encode with: base64 -w0 release.keystore" >&2
            exit 1
          fi

      - name: Validate Android keystore
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: renbrowser
        run: |
          set -euo pipefail
          keystore="${RUNNER_TEMP}/release.keystore"
          if ! keytool -list -alias "$KEY_ALIAS" -keystore "$keystore" -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "Android keystore validation failed for alias '$KEY_ALIAS'." >&2
            echo "Aliases in keystore:" >&2
            keytool -list -keystore "$keystore" -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | sed -n 's/^Alias name: //p' >&2 || true
            echo "Check ANDROID_KEYSTORE_PASSWORD (and ANDROID_KEY_PASSWORD if different) repository secrets." >&2
            exit 1
          fi

      - name: Build signed APK
        if: steps.android_sign.outputs.available == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: renbrowser
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          export ANDROID_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          task package:android

      - name: Build debug APK
        if: steps.android_sign.outputs.available != 'true' && (inputs.channel != 'release' || inputs.android_sign_release == false)
        run: task build:android

      - name: Stage artifacts
        if: inputs.channel != 'release' || inputs.android_sign_release == false || steps.android_sign.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          channel="${{ inputs.channel }}"
          apk="$(find bin -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk" ]; then
            echo "No APK found in bin/" >&2
            ls -la bin >&2 || true
            exit 1
          fi
          suffix=""
          if [ "${{ steps.android_sign.outputs.available }}" = "true" ]; then
            if [ "$channel" != "release" ]; then
              suffix="-signed"
            fi
          else
            suffix="-debug"
          fi
          final_name="renbrowser-android-universal${suffix}.apk"
          cp "$apk" "dist/release/${final_name}"
          echo "Staged APK: dist/release/${final_name}"

      - name: Upload artifacts
        if: inputs.channel != 'release' || inputs.android_sign_release == false || steps.android_sign.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-apk
          path: dist/release/*
          if-no-files-found: error

  build-ios:
    name: iOS (ipa)
    needs:
      - version
      - frontend
    runs-on: macos-latest
    env:
      REN_BROWSER_FRONTEND_PREBUILT: "1"
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Fetch frontend artifact
        uses: ./.github/actions/fetch-frontend-artifact
        with:
          artifact-name: ${{ needs.frontend.outputs.artifact_name }}

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "false"
          install-wails: "true"
          cache-node: "false"

      - name: Build iOS IPA
        run: task ios:package:ipa IOS_PLATFORM=device CODESIGN_IDENTITY="-"

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          cp bin/renbrowser.ipa dist/release/renbrowser-ios.ipa

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ios-ipa
          path: dist/release/*
          if-no-files-found: error

  build-extension-wasm:
    name: Extension WASM
    needs:
      - version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-linux-deps: "false"
          install-wails: "false"
          cache-node: "false"

      - name: Build micron-translator WASM
        run: bash build/scripts/build-extension-wasm.sh dist/release

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: extension-wasm
          path: dist/release/renbrowser-micron-translator*.wasm
          if-no-files-found: ignore

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup dependencies
        uses: ./.github/actions/setup
        with:
          install-wails: "false"
          install-linux-deps: "false"
          cache-node: "false"

      - name: Apt update (for Trivy .deb)
        run: sh build/scripts/ci/exec-priv.sh apt-get update -qq

      - name: Install Trivy
        run: sh build/scripts/ci/setup-trivy.sh "${{ env.CI_TRIVY_VERSION }}"

      - name: Generate SBOM
        run: task sbom

      - name: Stage SBOM files for release
        run: |
          set -euo pipefail
          cp sbom/sbom.spdx.json renbrowser-sbom.spdx.json
          cp sbom/sbom.cyclonedx.json renbrowser-sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-release
          path: |
            renbrowser-sbom.spdx.json
            renbrowser-sbom.cyclonedx.json
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - version
      - build-linux
      - build-flatpak
      - build-windows
      - build-macos
      - build-server
      - build-server-windows-legacy
      - build-android
      - build-extension-wasm
      - build-ios
      - sbom
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ren Browser
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          if [ ! -d artifacts ]; then
            echo "No artifacts directory after download." >&2
            exit 1
          fi
          find artifacts -type f \( -name 'renbrowser-*' -o -name 'renbrowser-sbom.*' \) -exec cp {} release/ \;
          if [ -z "$(find release -maxdepth 1 -type f ! -name 'renbrowser-sbom.*' | head -n 1)" ]; then
            echo "No release binaries found in downloaded artifacts." >&2
            find artifacts -type f | head -20 >&2 || true
            exit 1
          fi
          if [ ! -f release/renbrowser-sbom.spdx.json ] || [ ! -f release/renbrowser-sbom.cyclonedx.json ]; then
            echo "SBOM artifacts missing from download." >&2
            find artifacts -type f -name '*sbom*' >&2 || true
            exit 1
          fi
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Monitor binary size
        shell: bash
        run: bash build/scripts/ci/monitor-binary-size.sh release

      - name: Release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.version.outputs.version }}"
          tag="${{ needs.version.outputs.tag }}"
          channel="${{ inputs.channel }}"
          warning=""
          if [ "$channel" = "nightly" ] || [ "$channel" = "beta" ]; then
            warning=$'> [!WARNING]\n> This build may be unstable. It can include regressions, unfinished changes, or breaking behavior. Use a release build for production.\n\n'
          fi
          cat > release-notes.md <<EOF
          ${warning}## Ren Browser ${version}

          Channel: **${channel}**
          Commit: \`${{ github.sha }}\`

          ### Assets
          - Linux amd64/arm64 AppImage, plain binary, .deb, .rpm, and Arch `.pkg.tar.zst`
          - Linux amd64 Flatpak bundle when flatpak-builder succeeds
          - Windows amd64 portable executable and NSIS installer (MSIX when packaging succeeds)
          - macOS universal .app (zip)
          - iOS IPA (`renbrowser-ios.ipa` ad-hoc signed, for sideloading)
          - Headless server binaries (Linux amd64/arm64/armv6, FreeBSD amd64/arm64, OpenBSD/NetBSD amd64, Windows amd64 `renbrowser-server-windows-amd64.exe`)
          - Windows 7/8/8.1 headless server (`renbrowser-server-windows7-amd64.exe`) when the legacy toolchain build succeeds
          - Android universal APK (arm64-v8a + armeabi-v7a; debug for nightly/beta; signed release when keystore secrets are configured)
          - Micron Translator extension WASM (`renbrowser-micron-translator.wasm` one-file install; `renbrowser-micron-translator-backend.wasm` raw backend when TinyGo build succeeds)
          - Software Bill of Materials (`renbrowser-sbom.spdx.json`, `renbrowser-sbom.cyclonedx.json`)

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${tag}/CHANGELOG.md) for details.
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash build/scripts/github-publish-release.sh \
            "${{ inputs.channel }}" \
            "${{ needs.version.outputs.tag }}" \
            "Ren Browser ${{ needs.version.outputs.version }}" \
            "${{ inputs.prerelease }}" \
            "${{ inputs.channel == 'release' && 'true' || 'false' }}" \
            release-notes.md \
            release
