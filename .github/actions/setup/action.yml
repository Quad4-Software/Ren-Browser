# Pinned third-party actions (bump tag and SHA together when upgrading):
#   pnpm/action-setup@v6.0.9           0ebf47130e4866e96fce0953f49152a61190b271
#   actions/setup-go@v6.5.0            924ae3a1cded613372ab5595356fb5720e22ba16
#   actions/setup-node@v6.4.0          48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
#   arduino/setup-task@v3.0.0          c0bc642852239c2689f73f4ea6459c29405f3c52

name: Setup Ren Browser
description: Install Go, Node, Task, and optional Linux desktop build dependencies

inputs:
  install-linux-deps:
    description: Install GTK/WebKit packages for Linux desktop builds
    required: false
    default: "false"
  install-wails:
    description: Install the wails3 CLI
    required: false
    default: "true"
  go-version:
    description: Go toolchain version
    required: false
    default: "1.26.4"
  pnpm-version:
    description: pnpm version
    required: false
    default: "11.3.0"
  task-version:
    description: Task version
    required: false
    default: "3.49.1"
  wails-version:
    description: wails3 module version tag
    required: false
    default: "v3.0.0-alpha2.111"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Configure pnpm
      shell: bash
      run: |
        set -euo pipefail
        pnpm config set strict-dep-builds false
        pnpm config set --location project strict-dep-builds false

    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: go.sum

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: "22"
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup Task
      uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52
      with:
        version: ${{ inputs.task-version }}

    - name: Install Linux desktop dependencies
      if: inputs.install-linux-deps == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          pkg-config gcc libc6-dev \
          libglib2.0-dev \
          libgtk-4-dev libwebkitgtk-6.0-dev \
          libgtk-3-dev libwebkit2gtk-4.1-dev \
          curl librsvg2-bin
        pkg-config --modversion gtk4
        pkg-config --modversion webkitgtk-6.0

    - name: Install wails3
      if: inputs.install-wails == 'true'
      shell: bash
      env:
        GOFLAGS: -mod=mod
      run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ inputs.wails-version }}

    - name: Prepare Go build inputs
      shell: bash
      run: bash build/scripts/ci-prep-go.sh
