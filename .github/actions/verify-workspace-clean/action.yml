name: Verify workspace clean
description: Recheck byte-level tree inventory and reject unexpected runner mutations
runs:
  using: composite
  steps:
    - name: Verify workspace clean
      shell: bash
      env:
        RNS_INVENTORY_OUT: ${{ runner.temp }}/renbrowser-tree-inventory.txt
        # Soft: warn on inventory/workdir drift from tooling (pnpm, gofmt).
        # Start-of-job verify-tree-rsm.sh remains a hard signature check.
        RNS_CLEAN_SOFT: "1"
      run: sh build/scripts/verify-workspace-clean.sh "$RNS_INVENTORY_OUT"
