# Bundles the host-built Wails binary. Default Ren Browser builds use GTK4 + WebKitGTK 6.0,
# which matches org.gnome.Platform 50. Then: task linux:flatpak:install | flatpak:repo | flatpak:bundle
app-id: io.quad4.renbrowser
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: renbrowser

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=xdg-config/io.quad4.renbrowser:create
  - --env=WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1

modules:
  - name: renbrowser
    buildsystem: simple
    build-commands:
      - install -Dm755 renbrowser -t /app/bin/
      - install -Dm644 io.quad4.renbrowser.desktop /app/share/applications/io.quad4.renbrowser.desktop
      - install -Dm644 io.quad4.renbrowser.metainfo.xml /app/share/metainfo/io.quad4.renbrowser.metainfo.xml
      - install -Dm644 io.quad4.renbrowser-64.png /app/share/icons/hicolor/64x64/apps/io.quad4.renbrowser.png
      - install -Dm644 io.quad4.renbrowser-128.png /app/share/icons/hicolor/128x128/apps/io.quad4.renbrowser.png
      - install -Dm644 io.quad4.renbrowser-256.png /app/share/icons/hicolor/256x256/apps/io.quad4.renbrowser.png
    sources:
      - type: dir
        path: ../build/flatpak/staging
