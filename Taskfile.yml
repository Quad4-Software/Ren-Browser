version: '3'

vars:
  APP_NAME: "renbrowser"
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "pnpm"}}'
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  GOOS: '{{.GOOS | default OS}}'
  RETICULUM_GO: '{{.RETICULUM_GO | default "../Reticulum/Reticulum-Go"}}'
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo dev

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

tasks:
  default:
    cmds:
      - task: check

  check:
    desc: Run Go and frontend quality gates
    deps:
      - fmt:go
      - test:go
      - gosec
      - task: common:check:brand
      - frontend:check

  fmt:go:
    desc: Format Go sources
    cmds:
      - bash build/scripts/gofmt-project.sh write
    env:
      GOFLAGS: "-mod=vendor"

  vendor:go:
    desc: Refresh vendor/ from go.mod (fetches reticulum-go, patches, vendors all deps)
    cmds:
      - bash build/scripts/vendor-go.sh
    env:
      GOFLAGS: "-mod=mod"

  format:
    desc: Format Go and frontend sources
    deps:
      - fmt:go
      - frontend:fmt

  gosec:
    desc: Run gosec security scanner
    cmds:
      - bash "{{.ROOT_DIR}}/build/scripts/gosec.sh" ./...

  check:reproducible:
    desc: Verify headless server binary builds are bitwise reproducible
    cmds:
      - bash build/scripts/check-reproducible-binary.sh
    env:
      GOFLAGS: "-mod=vendor"

  test:
    desc: Run all tests
    deps:
      - test:go
      - frontend:test

  test:go:
    desc: Run Go unit tests
    cmds:
      - go test ./...
    env:
      GOFLAGS: "-mod=vendor"

  test:go:race:
    desc: Run Go tests with race detector
    cmds:
      - go test -race ./...
    env:
      GOFLAGS: "-mod=vendor"

  test:contract:
    desc: Verify Wails bindings match Go service methods
    cmds:
      - bash build/scripts/ci-prep-go.sh
      - go test ./internal/contract/...
    env:
      GOFLAGS: "-mod=vendor"

  test:go:stress:
    desc: Concurrent stress tests with race detector (deadlock/race checks)
    cmds:
      - go test -race -tags=stress -timeout=5m ./internal/store/... ./internal/db/... ./internal/cache/...
    env:
      GOFLAGS: "-mod=vendor"

  test:regression:
    desc: Reliability and optimization regression suite
    cmds:
      - go test ./internal/regression/... ./internal/cache/... ./internal/nomadnet/... ./internal/store/... ./internal/app/... ./internal/servermw/... ./internal/limits/... ./internal/apperrors/... ./internal/db/... ./internal/plugins/... ./internal/content/... ./internal/safe/...
      - go test -race -tags=stress -timeout=5m ./internal/cache/...
    env:
      GOFLAGS: "-mod=vendor"

  test:plugins:
    desc: Run plugin system unit tests
    cmds:
      - go test ./internal/plugins/...
      - pnpm --dir frontend exec vitest run src/lib/plugins
    env:
      GOFLAGS: "-mod=vendor"

  test:go:leak:
    desc: Goroutine leak checks via goleak
    cmds:
      - go test -tags=leak ./internal/store/... ./internal/db/...
    env:
      GOFLAGS: "-mod=vendor"

  fuzz:go:
    desc: Run Go fuzz tests
    cmds:
      - go test -fuzz='^FuzzParseURL$' -fuzztime=30s ./internal/nomadnet/...
      - go test -fuzz='^FuzzParseURLFields$' -fuzztime=30s ./internal/nomadnet/...
      - go test -fuzz='^FuzzResolveNavigation$' -fuzztime=30s ./internal/micron/...
      - go test -fuzz='^FuzzSanitizeHTML$' -fuzztime=30s ./internal/content/...
      - go test -fuzz='^FuzzVerifyPassword$' -fuzztime=30s ./internal/auth/...
      - go test -fuzz='^FuzzHashPassword$' -fuzztime=30s ./internal/auth/...
      - go test -fuzz='^FuzzNormalizeIP$' -fuzztime=30s ./internal/auth/...
      - go test -fuzz='^FuzzClientHash$' -fuzztime=30s ./internal/auth/...
      - go test -fuzz='^FuzzParseWhitelist$' -fuzztime=30s ./internal/auth/...
      - go test -tags server -fuzz='^FuzzGuardLogin$' -fuzztime=30s ./internal/serverauth/...
      - go test -tags server -fuzz='^FuzzGuardRoute$' -fuzztime=30s ./internal/serverauth/...
    env:
      GOFLAGS: "-mod=vendor"

  test:go:hard:
    desc: Race, leak, stress, and fuzz checks
    deps:
      - test:go:race
      - test:go:leak
      - test:go:stress
      - test:regression
      - fuzz:go

  bench:go:
    desc: Run Go benchmarks (smoke run for CI artifacts)
    cmds:
      - mkdir -p bench
      - go test -run='^$' -bench=. -benchmem -count=1 ./internal/cache/... ./internal/content/... ./internal/nomadnet/... | tee bench/go.txt
    env:
      GOFLAGS: "-mod=vendor"

  test:interop:
    desc: Live Reticulum interop tests (requires network)
    cmds:
      - go test -tags=interop -timeout=5m ./internal/interop/...
    env:
      GOFLAGS: "-mod=vendor"

  frontend:check:
    desc: Typecheck, lint, format check, knip, and unit tests
    deps:
      - common:install:frontend:deps
    cmds:
      - task: common:frontend:run
        vars: { SCRIPT: check }
      - task: common:frontend:run
        vars: { SCRIPT: lint }
      - task: common:frontend:run
        vars: { SCRIPT: format:check }
      - task: common:frontend:run
        vars: { SCRIPT: knip }
      - task: common:frontend:run
        vars: { SCRIPT: audit }
      - task: common:frontend:run
        vars: { SCRIPT: test }

  frontend:test:
    deps:
      - common:install:frontend:deps
    cmds:
      - task: common:frontend:run
        vars: { SCRIPT: test }

  frontend:fmt:
    desc: Format frontend sources with Prettier
    deps:
      - common:install:frontend:deps
    cmds:
      - task: common:frontend:run
        vars: { SCRIPT: format }

  mod:tidy:
    desc: Refresh go.mod, go.sum, and vendor/
    cmds:
      - go mod tidy
      - task: vendor:go
    env:
      GOFLAGS: "-mod=mod"

  build:
    summary: Builds the application
    timeout: 20m
    cmds:
      - task: "{{.GOOS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{.GOOS}}:package"

  package:windows:
    desc: Package Ren Browser for Windows (NSIS installer)
    cmds:
      - task: windows:package

  package:darwin:
    desc: Package Ren Browser for macOS (.app bundle)
    cmds:
      - task: darwin:package

  package:darwin:universal:
    desc: Package universal macOS binary
    cmds:
      - task: darwin:package:universal

  package:linux:appimage:
    desc: Build a fuse3-compatible AppImage
    cmds:
      - task: linux:create:appimage

  package:linux:flatpak:install:
    desc: Build and install the Flatpak locally
    cmds:
      - task: linux:flatpak:install

  package:linux:flatpak:bundle:
    desc: Build a single-file Flatpak bundle
    cmds:
      - task: linux:flatpak:bundle

  build:windows:
    desc: Cross-compile for Windows
    cmds:
      - task: windows:build

  build:darwin:
    desc: Build for macOS
    cmds:
      - task: darwin:build

  build:android:
    desc: Build debug APK for Android (arm64 for physical devices)
    cmds:
      - task: android:build
        vars:
          ARCH: arm64
      - task: android:assemble:apk

  build:android:all:
    desc: Build debug APK for all Android architectures (fat debug APK)
    cmds:
      - task: android:build
        vars:
          ARCH: arm64
          KEEP_OTHER_ABIS: "true"
      - task: android:compile:go:shared
        vars:
          ARCH: amd64
          KEEP_OTHER_ABIS: "true"
      - task: android:compile:go:shared
        vars:
          ARCH: arm
          KEEP_OTHER_ABIS: "true"
      - task: android:compile:go:shared
        vars:
          ARCH: 386
          KEEP_OTHER_ABIS: "true"
      - task: android:assemble:apk

  build:android:emu:
    desc: Build debug APK for the Android emulator (host ABI)
    cmds:
      - task: android:build
      - task: android:assemble:apk

  package:android:
    desc: Package production APK for Android (arm64 + x86_64)
    cmds:
      - task: android:package:default

  package:android:all:
    desc: Package production APK for all Android architectures (arm64, x86_64, arm, 386)
    cmds:
      - task: android:package:fat

  run:android:
    desc: Build, install, and launch on Android emulator
    cmds:
      - task: android:run

  run:
    summary: Runs the application
    cmds:
      - task: "{{.GOOS}}:run"
        vars: { CLI_ARGS: '{{.CLI_ARGS}}' }

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  screenshots:
    desc: Capture README preview screenshots into screenshots/desktop and screenshots/mobile
    deps:
      - common:install:frontend:deps
    cmds:
      - task: common:build:server
      - pnpm --dir frontend exec playwright install chromium
      - pnpm --dir frontend run screenshots
    env:
      GOFLAGS: "-mod=vendor"

  run:assets-dir:
    desc: Run using frontend assets from a directory
    cmds:
      - go run . --assets-dir {{.ASSETS_DIR | default "frontend/dist"}}
    env:
      GOFLAGS: "-mod=vendor"

  run:assets-zip:
    desc: Run using frontend assets from a zip archive
    cmds:
      - go run . --assets-zip {{.ASSETS_ZIP}}
    env:
      GOFLAGS: "-mod=vendor"

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  build:server:windows-legacy:
    desc: Build headless server .exe for Windows 7/8/8.1 (go-legacy-win7)
    cmds:
      - task: common:build:server:windows-legacy

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker

  release:rngit:
    desc: Build Linux/Windows/server/APK binaries and publish an rngit release
    cmds:
      - bash build/scripts/rngit-release.sh
    env:
      GOFLAGS: "-mod=vendor"

  release:rngit:local:
    desc: Build release binaries and create a local rngit manifest without uploading
    cmds:
      - bash build/scripts/rngit-release.sh --local
    env:
      GOFLAGS: "-mod=vendor"
